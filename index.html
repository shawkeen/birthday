<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Card Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --plum: #4a1942; --rose: #c9617a; --gold: #d4a843;
      --champagne: #f5e6c8; --cream: #fdf8f0; --deep: #1e0a1c;
      --glass: rgba(255,255,255,0.08); --glass-border: rgba(255,255,255,0.18);
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--deep);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .bg-mesh {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, #6b1f5e55 0%, transparent 60%),
        radial-gradient(ellipse 70% 50% at 80% 80%, #9b2d6055 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 60% 10%, #3b1a4844 0%, transparent 60%),
        linear-gradient(135deg, #1e0a1c 0%, #2d0f2a 50%, #1a0c1e 100%);
      animation: meshDrift 12s ease-in-out infinite alternate;
    }
    @keyframes meshDrift {
      0%   { filter: hue-rotate(0deg) brightness(1); }
      100% { filter: hue-rotate(15deg) brightness(1.08); }
    }
    .orb { position: fixed; border-radius: 50%; filter: blur(70px); z-index: 0; animation: orbFloat linear infinite; }
    .orb1 { width:300px; height:300px; background:rgba(201,97,122,.18); top:-80px; left:-80px; animation-duration:18s; }
    .orb2 { width:250px; height:250px; background:rgba(212,168,67,.12); bottom:-60px; right:-60px; animation-duration:22s; animation-delay:-5s; }
    .orb3 { width:180px; height:180px; background:rgba(107,31,94,.25); top:50%; left:60%; animation-duration:15s; animation-delay:-9s; }
    @keyframes orbFloat {
      0%   { transform:translate(0,0) scale(1); }
      33%  { transform:translate(30px,-40px) scale(1.1); }
      66%  { transform:translate(-20px,20px) scale(0.92); }
      100% { transform:translate(0,0) scale(1); }
    }
    canvas#confetti { position:fixed; inset:0; pointer-events:none; z-index:10; }

    /* ── shared card shell ── */
    .card-wrap { position:relative; z-index:5; padding:20px; width:100%; max-width:480px; }
    .card {
      background: var(--glass);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 28px; padding: 44px 36px 36px;
      position: relative; overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.04) inset;
    }
    .card::before {
      content:''; position:absolute; top:0; left:10%; right:10%; height:1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.4), transparent);
    }
    .card::after {
      content:''; position:absolute; top:0; left:-100%; width:60%; height:100%;
      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,.04) 50%, transparent 60%);
      animation: shimmer 7s ease-in-out infinite; pointer-events:none;
    }
    @keyframes shimmer { 0%,100% { left:-100%; } 50% { left:140%; } }

    .crown-badge {
      position:absolute; top:-18px; left:50%; transform:translateX(-50%);
      background: linear-gradient(135deg,#c9617a,#d4a843);
      color:white; font-size:11px; font-weight:500; letter-spacing:.15em; text-transform:uppercase;
      padding:6px 22px; border-radius:20px;
      box-shadow:0 4px 20px rgba(212,168,67,.35); white-space:nowrap;
    }
    h1 {
      font-family:'Cormorant Garamond',serif; font-size:clamp(2rem,8vw,2.8rem);
      font-weight:600; line-height:1.1;
      background:linear-gradient(135deg,#f7d794 0%,#f5c6cb 40%,#c9617a 70%,#d4a843 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .subtitle { font-size:12.5px; color:rgba(255,255,255,.4); letter-spacing:.22em; text-transform:uppercase; margin-top:4px; }
    .age-block {
      margin:22px 0 18px; text-align:center;
      background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08);
      border-radius:14px; padding:14px 20px; position:relative;
    }
    .age-label { font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:rgba(255,255,255,.35); margin-bottom:4px; }
    .age-value { font-family:'Cormorant Garamond',serif; font-size:1.9rem; font-weight:600; color:var(--champagne); }
    .age-pulse {
      position:absolute; right:14px; top:50%; transform:translateY(-50%);
      width:8px; height:8px; border-radius:50%; background:#c9617a;
      box-shadow:0 0 0 0 rgba(201,97,122,.6); animation:pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(201,97,122,.6)} 70%{box-shadow:0 0 0 8px rgba(201,97,122,0)} 100%{box-shadow:0 0 0 0 rgba(201,97,122,.6)} }
    .joke-box {
      background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07);
      border-radius:16px; padding:18px 20px; min-height:80px;
      display:flex; align-items:center; justify-content:center; margin-bottom:20px;
    }
    .joke-text {
      font-family:'Cormorant Garamond',serif; font-style:italic;
      font-size:1.07rem; line-height:1.55; color:rgba(255,255,255,.82);
      text-align:center; transition:opacity .35s ease;
    }
    .joke-text.fade { opacity:0; }
    .btn-group { display:flex; flex-direction:column; gap:10px; }
    .btn {
      width:100%; border:none; cursor:pointer;
      font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500;
      border-radius:14px; padding:14px 20px;
      transition:transform .15s ease,box-shadow .15s ease,filter .15s ease;
      position:relative; overflow:hidden; letter-spacing:.02em;
    }
    .btn:active { transform:scale(.97); }
    .btn-wish {
      background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14);
      color:rgba(255,255,255,.88);
    }
    .btn-wish:hover { background:rgba(255,255,255,.13); box-shadow:0 4px 20px rgba(0,0,0,.3); }
    .btn-gift {
      background:linear-gradient(135deg,#c9617a 0%,#9b3060 40%,#d4a843 100%);
      color:white; box-shadow:0 6px 28px rgba(201,97,122,.38);
    }
    .btn-gift:hover { filter:brightness(1.1); box-shadow:0 8px 36px rgba(201,97,122,.5); }
    .btn-gift .btn-ripple {
      position:absolute; inset:0;
      background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.18) 50%,transparent 60%);
      transform:translateX(-100%); transition:transform .5s ease;
    }
    .btn-gift:hover .btn-ripple { transform:translateX(100%); }
    .gift-result {
      margin-top:12px; min-height:36px; text-align:center;
      font-size:13px; color:rgba(255,255,255,.6); font-style:italic;
      transition:opacity .3s ease; line-height:1.5;
    }
    .coin-popup {
      position:fixed; pointer-events:none; z-index:999;
      font-family:'DM Sans',sans-serif; font-size:18px; font-weight:700;
      color:#f7d794; text-shadow:0 2px 8px rgba(0,0,0,.6),0 0 20px rgba(212,168,67,.8);
      animation:coinRise 1.4s ease-out forwards;
      display:flex; align-items:center; gap:4px; white-space:nowrap;
    }
    .coin-popup .coin-icon {
      width:22px; height:22px;
      background:radial-gradient(circle at 35% 35%,#ffe066,#d4a843,#8a6c1e);
      border-radius:50%; box-shadow:0 2px 8px rgba(212,168,67,.6),inset 0 1px 2px rgba(255,255,255,.5);
      display:inline-block; flex-shrink:0;
    }
    @keyframes coinRise {
      0%   { opacity:0; transform:translateY(0) scale(.6); }
      15%  { opacity:1; transform:translateY(-10px) scale(1.1); }
      60%  { opacity:1; transform:translateY(-55px) scale(1); }
      100% { opacity:0; transform:translateY(-90px) scale(.9); }
    }
    .coin-total { text-align:center; margin-top:6px; font-size:11px; color:rgba(255,255,255,.25); letter-spacing:.05em; transition:color .3s ease; }
    .coin-total.bumped { color:rgba(212,168,67,.7); }
    .deco-dots { position:absolute; top:18px; right:20px; display:flex; gap:5px; opacity:.3; }
    .deco-dots span { width:5px; height:5px; border-radius:50%; background:var(--champagne); }
    .deco-dots span:nth-child(2) { opacity:.6; } .deco-dots span:nth-child(3) { opacity:.3; }
    .divider { height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent); margin:20px 0; }

    /* ── Generator (landing) styles ── */
    #generator { display:none; }
    #generator .gen-title {
      text-align:center; margin-bottom:24px;
    }
    #generator h1 { font-size:clamp(1.6rem,6vw,2.2rem); }
    #generator .subtitle { margin-top:6px; }

    .field-label {
      display:block; font-size:10px; letter-spacing:.18em; text-transform:uppercase;
      color:rgba(255,255,255,.4); margin-bottom:6px;
    }
    .gen-input {
      width:100%; background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12); border-radius:12px;
      padding:12px 16px; color:rgba(255,255,255,.9);
      font-family:'DM Sans',sans-serif; font-size:14px;
      outline:none; transition:border-color .2s ease;
    }
    .gen-input:focus { border-color:rgba(201,97,122,.6); }
    .gen-input::placeholder { color:rgba(255,255,255,.25); }
    .field-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .field-group { margin-bottom:16px; }

    .btn-generate {
      width:100%; border:none; cursor:pointer;
      font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500;
      border-radius:14px; padding:14px 20px; margin-top:4px;
      background:linear-gradient(135deg,#c9617a 0%,#9b3060 40%,#d4a843 100%);
      color:white; box-shadow:0 6px 28px rgba(201,97,122,.38);
      transition:filter .15s ease,transform .15s ease;
      position:relative; overflow:hidden;
    }
    .btn-generate:hover { filter:brightness(1.1); }
    .btn-generate:active { transform:scale(.97); }

    .link-output {
      margin-top:16px; background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08); border-radius:12px;
      padding:14px 16px; display:none;
    }
    .link-label { font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:rgba(255,255,255,.3); margin-bottom:6px; }
    .link-value {
      font-size:13px; color:rgba(212,168,67,.9); word-break:break-all;
      font-family:monospace; line-height:1.5;
    }
    .link-actions { display:flex; gap:8px; margin-top:10px; }
    .link-btn {
      flex:1; padding:9px 12px; border-radius:10px; border:none; cursor:pointer;
      font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500;
      transition:filter .15s ease;
    }
    .link-btn-copy { background:rgba(255,255,255,.1); color:rgba(255,255,255,.8); }
    .link-btn-open { background:rgba(201,97,122,.25); color:rgba(201,97,122,.9); }
    .link-btn:hover { filter:brightness(1.2); }

    .gen-footer { text-align:center; margin-top:14px; font-size:11px; color:rgba(255,255,255,.18); letter-spacing:.06em; }
    .gen-footer a { color:rgba(201,97,122,.5); text-decoration:none; }
    .gen-footer a:hover { color:rgba(201,97,122,.8); }

    /* card footer note */
    .footer-note { text-align:center; font-size:11.5px; color:rgba(255,255,255,.22); letter-spacing:.08em; }
  </style>
</head>
<body>

<div class="bg-mesh"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<canvas id="confetti"></canvas>

<div class="card-wrap">
  <div class="card">

    <!-- ════════════ BIRTHDAY CARD VIEW ════════════ -->
    <div id="card-view">
      <div class="crown-badge">✦ Special Day ✦</div>
      <div class="deco-dots"><span></span><span></span><span></span></div>

      <div style="text-align:center; margin-bottom:6px;">
        <h1 id="cardTitle">Happy Birthday 🎂</h1>
        <p class="subtitle" id="cardSubtitle">It's your day — own it</p>
      </div>

      <div class="age-block">
        <div class="age-label">You are exactly</div>
        <div class="age-value" id="age">…</div>
        <div style="font-size:11px;color:rgba(255,255,255,.3);margin-top:3px;">years young 🎈</div>
        <div class="age-pulse"></div>
      </div>

      <div class="joke-box">
        <p class="joke-text" id="joke"></p>
      </div>

      <div class="btn-group">
        <button class="btn btn-wish" onclick="nextJoke()">Next Wish &nbsp;✨</button>
        <button class="btn btn-gift" id="giftBtn" onclick="claimGift(event)">
          <div class="btn-ripple"></div>
          🎁&nbsp; Claim ₹500 Amazon Gift Card
        </button>
      </div>

      <div class="gift-result" id="giftResult"></div>
      <div class="coin-total" id="coinTotal"></div>

      <div class="divider"></div>
      <p class="footer-note">Made with 💜 by <a href="https://github.com/shawkeen/birthday" style="color:rgba(201,97,122,.6);text-decoration:none;">shawkeen</a> &nbsp;·&nbsp; <span id="makeYourOwn" style="cursor:pointer;color:rgba(212,168,67,.5);" onclick="showGenerator()">Make your own ↗</span></p>
    </div>

    <!-- ════════════ GENERATOR VIEW ════════════ -->
    <div id="generator">
      <div class="gen-title">
        <h1>Birthday Card<br>Generator ✦</h1>
        <p class="subtitle">Create a personalized link to share</p>
      </div>

      <div class="field-group">
        <label class="field-label" for="genName">Name</label>
        <input class="gen-input" id="genName" type="text" placeholder="e.g. Neha" autocomplete="off" spellcheck="false" oninput="updateLink()">
      </div>

      <div class="field-row">
        <div class="field-group">
          <label class="field-label" for="genDay">Day</label>
          <input class="gen-input" id="genDay" type="number" placeholder="DD" min="1" max="31" oninput="updateLink()">
        </div>
        <div class="field-group">
          <label class="field-label" for="genMonth">Month</label>
          <input class="gen-input" id="genMonth" type="number" placeholder="MM" min="1" max="12" oninput="updateLink()">
        </div>
      </div>

      <div class="field-group">
        <label class="field-label" for="genYear">Year of Birth</label>
        <input class="gen-input" id="genYear" type="number" placeholder="YYYY" min="1900" max="2020" oninput="updateLink()">
      </div>

      <button class="btn-generate" onclick="generateLink()">Generate Link 🎉</button>

      <div class="link-output" id="linkOutput">
        <div class="link-label">Your Shareable Link</div>
        <div class="link-value" id="linkValue"></div>
        <div class="link-actions">
          <button class="link-btn link-btn-copy" onclick="copyLink()">Copy Link</button>
          <button class="link-btn link-btn-open" onclick="openLink()">Open Card ↗</button>
        </div>
      </div>

      <div class="gen-footer">
        <a href="#" onclick="showCard(event)">← Back to card</a> &nbsp;·&nbsp;
        <a href="https://github.com/shawkeen/birthday" target="_blank">GitHub</a>
      </div>
    </div>

  </div>
</div>

<script>
// ─────────────────────────────────────────
// 1. ROUTE — parse name & dob from URL path
// ─────────────────────────────────────────
(function() {
  // GitHub Pages 404 trick: restore stored path
  var storedPath = sessionStorage.getItem('bday_path');
  if (storedPath) {
    sessionStorage.removeItem('bday_path');
    history.replaceState(null, null, storedPath);
  }

  var pathname = window.location.pathname; // e.g. /birthday/Neha/06051997/
  var parts    = pathname.split('/').filter(Boolean);
  // parts[0] = 'birthday' (repo base), parts[1] = name, parts[2] = DDMMYYYY

  var rawName  = parts[1] ? decodeURIComponent(parts[1]) : '';
  var dobStr   = parts[2] ? parts[2].replace(/\D/g,'') : '';

  if (rawName && dobStr.length === 8) {
    // ── Show the birthday card ──
    var dd   = parseInt(dobStr.slice(0,2), 10);
    var mm   = parseInt(dobStr.slice(2,4), 10) - 1; // 0-indexed month
    var yyyy = parseInt(dobStr.slice(4,8), 10);

    window._bday = {
      name:      rawName,
      birthDate: new Date(yyyy, mm, dd)
    };
    document.title = 'Happy Birthday ' + rawName + ' 🎂';
    initCard();
  } else {
    // ── Show generator landing page ──
    document.title = 'Birthday Card Generator';
    document.getElementById('card-view').style.display = 'none';
    document.getElementById('generator').style.display  = 'block';
    // Hide crown badge since it's positioned for card
    var badge = document.querySelector('.crown-badge');
    if (badge) badge.style.display = 'none';
  }
})();

// ─────────────────────────────────────────
// 2. CARD LOGIC
// ─────────────────────────────────────────
function initCard() {
  var name      = window._bday.name;
  var birthDate = window._bday.birthDate;

  // Personalise title
  document.getElementById('cardTitle').textContent = 'Happy Birthday, ' + name + ' 🎂';

  // Age ticker
  function updateAge() {
    var ms    = Date.now() - birthDate.getTime();
    var years = ms / (1000 * 60 * 60 * 24 * 365.2425);
    document.getElementById('age').textContent = years.toFixed(6) + ' yrs';
  }
  updateAge();
  setInterval(updateAge, 50);

  // Jokes
  var jokes = buildJokes(name);
  var lastIdx = -1;
  window.nextJoke = function() {
    var idx;
    do { idx = Math.floor(Math.random() * jokes.length); } while (idx === lastIdx);
    lastIdx = idx;
    var el = document.getElementById('joke');
    el.classList.add('fade');
    setTimeout(function() { el.textContent = jokes[idx]; el.classList.remove('fade'); }, 350);
    launchConfetti();
  };
  window.nextJoke();

  // Gift prank
  var pranks = buildPranks();
  var totalCoins = 0;
  window.claimGift = function(e) {
    totalCoins++;
    document.getElementById('giftResult').textContent = pranks[Math.floor(Math.random() * pranks.length)];
    var totalEl = document.getElementById('coinTotal');
    totalEl.textContent = 'Total imaginary coins collected: ₹' + totalCoins;
    totalEl.classList.remove('bumped');
    void totalEl.offsetWidth;
    totalEl.classList.add('bumped');
    setTimeout(function() { totalEl.classList.remove('bumped'); }, 800);
    spawnCoinPopup();
    playCoinChime();
    launchConfetti();
  };

  launchConfetti();
}

// ─────────────────────────────────────────
// 3. GENERATOR LOGIC
// ─────────────────────────────────────────
var BASE_URL = 'https://shawkeen.github.io/birthday/';

function pad2(n) { return String(n).padStart(2,'0'); }

function updateLink() { /* live update happens on generateLink click */ }

function generateLink() {
  var name  = document.getElementById('genName').value.trim();
  var day   = parseInt(document.getElementById('genDay').value, 10);
  var month = parseInt(document.getElementById('genMonth').value, 10);
  var year  = parseInt(document.getElementById('genYear').value, 10);

  if (!name)                          { alert('Please enter a name'); return; }
  if (!day || !month || !year)        { alert('Please fill in the full date of birth'); return; }
  if (day < 1   || day > 31)         { alert('Day must be between 1 and 31'); return; }
  if (month < 1 || month > 12)       { alert('Month must be between 1 and 12'); return; }
  if (year < 1900 || year > new Date().getFullYear()) {
    alert('Year must be between 1900 and ' + new Date().getFullYear()); return;
  }

  // Validate the date actually exists (e.g. rejects 31 Feb, 31 Apr)
  var testDate = new Date(year, month - 1, day);
  if (testDate.getFullYear() !== year || testDate.getMonth() !== month - 1 || testDate.getDate() !== day) {
    alert('That date doesn\'t exist — please check day/month'); return;
  }

  var dobStr = pad2(day) + pad2(month) + year;
  var link   = BASE_URL + encodeURIComponent(name) + '/' + dobStr + '/';

  document.getElementById('linkValue').textContent = link;
  document.getElementById('linkOutput').style.display = 'block';
  window._generatedLink = link;
}

function copyLink() {
  var link = window._generatedLink;
  if (!link) return;
  navigator.clipboard.writeText(link).then(function() {
    var btn = document.querySelector('.link-btn-copy');
    btn.textContent = 'Copied ✓';
    setTimeout(function() { btn.textContent = 'Copy Link'; }, 2000);
  }).catch(function() {
    prompt('Copy this link:', link);
  });
}

function openLink() {
  if (window._generatedLink) window.open(window._generatedLink, '_blank');
}

function showGenerator() {
  document.getElementById('card-view').style.display = 'none';
  document.getElementById('generator').style.display  = 'block';
  var badge = document.querySelector('.crown-badge');
  if (badge) badge.style.display = 'none';
}

function showCard(e) {
  if (e) e.preventDefault();
  document.getElementById('generator').style.display  = 'none';
  document.getElementById('card-view').style.display = 'block';
  var badge = document.querySelector('.crown-badge');
  if (badge) badge.style.display = '';
}

// ─────────────────────────────────────────
// 4. COIN POPUP + CHIME
// ─────────────────────────────────────────
function spawnCoinPopup() {
  var btn  = document.getElementById('giftBtn');
  var rect = btn.getBoundingClientRect();
  var popup = document.createElement('div');
  popup.className = 'coin-popup';
  popup.innerHTML = '<span class="coin-icon"></span> +₹1';
  popup.style.left = (rect.left + rect.width/2 - 40 + (Math.random()-.5)*60) + 'px';
  popup.style.top  = (rect.top - 10) + 'px';
  document.body.appendChild(popup);
  setTimeout(function() { popup.remove(); }, 1450);
}

function playCoinChime() {
  try {
    var ctx   = new (window.AudioContext || window.webkitAudioContext)();
    var notes = [{f:1046.5,s:0,d:.18},{f:1318.5,s:.08,d:.18},{f:1567.9,s:.16,d:.28}];
    notes.forEach(function(n) {
      var osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.type = 'sine'; osc.frequency.setValueAtTime(n.f, ctx.currentTime + n.s);
      gain.gain.setValueAtTime(0, ctx.currentTime + n.s);
      gain.gain.linearRampToValueAtTime(0.28, ctx.currentTime + n.s + .01);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + n.s + n.d);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(ctx.currentTime + n.s); osc.stop(ctx.currentTime + n.s + n.d + .05);
    });
    setTimeout(function() { ctx.close(); }, 1200);
  } catch(e) {}
}

// 5. CONFETTI
// ─────────────────────────────────────────
var canvas = document.getElementById('confetti');
var ctx2   = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
window.addEventListener('resize', function() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

var particles = [];
var SHAPES = ['rect','circle','star','heart'];
var COLORS = ['#f7d794','#c9617a','#f5c6cb','#d4a843','#e8a0b0','#fff5cc','#b5a9f5','#a8e6cf'];

function spawnParticle() {
  return {
    x: Math.random()*canvas.width, y:-10,
    vx:(Math.random()-.5)*3, vy:Math.random()*3+1.5,
    size:Math.random()*9+4,
    shape:SHAPES[Math.floor(Math.random()*SHAPES.length)],
    color:COLORS[Math.floor(Math.random()*COLORS.length)],
    rotation:Math.random()*Math.PI*2, spin:(Math.random()-.5)*.15,
    life:1, decay:Math.random()*.008+.004
  };
}

function launchConfetti() {
  for (var i=0; i<80; i++) {
    (function(i){ setTimeout(function(){ particles.push(spawnParticle()); }, i*12); })(i);
  }
}

function drawStar(x,y,r) {
  ctx2.beginPath();
  for (var i=0;i<5;i++){
    var a1=(i*4*Math.PI/5)-Math.PI/2, a2=(i*4*Math.PI/5+2*Math.PI/5)-Math.PI/2;
    if(i===0) ctx2.moveTo(x+r*Math.cos(a1),y+r*Math.sin(a1));
    else ctx2.lineTo(x+r*Math.cos(a1),y+r*Math.sin(a1));
    ctx2.lineTo(x+(r/2.2)*Math.cos(a2),y+(r/2.2)*Math.sin(a2));
  }
  ctx2.closePath();
}

function drawHeart(x,y,s) {
  ctx2.beginPath();
  ctx2.moveTo(x,y+s*.3);
  ctx2.bezierCurveTo(x,y,x-s,y,x-s,y-s*.35);
  ctx2.bezierCurveTo(x-s,y-s*.9,x,y-s*.9,x,y-s*.5);
  ctx2.bezierCurveTo(x,y-s*.9,x+s,y-s*.9,x+s,y-s*.35);
  ctx2.bezierCurveTo(x+s,y,x,y,x,y+s*.3);
  ctx2.closePath();
}

(function loop() {
  ctx2.clearRect(0,0,canvas.width,canvas.height);
  particles = particles.filter(function(p){ return p.life>0 && p.y<canvas.height+20; });
  particles.forEach(function(p) {
    p.x+=p.vx; p.y+=p.vy; p.rotation+=p.spin; p.vy+=.04; p.life-=p.decay;
    ctx2.save(); ctx2.globalAlpha=Math.max(0,p.life);
    ctx2.translate(p.x,p.y); ctx2.rotate(p.rotation); ctx2.fillStyle=p.color;
    if (p.shape==='rect')   { ctx2.fillRect(-p.size/2,-p.size/4,p.size,p.size/2); }
    else if (p.shape==='circle') { ctx2.beginPath(); ctx2.arc(0,0,p.size/2,0,Math.PI*2); ctx2.fill(); }
    else if (p.shape==='star')   { drawStar(0,0,p.size/2); ctx2.fill(); }
    else                         { drawHeart(0,0,p.size/2.4); ctx2.fill(); }
    ctx2.restore();
  });
  requestAnimationFrame(loop);
})();

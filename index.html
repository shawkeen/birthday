      position: relative;

      position: fixed; inset: 0; z-index: 0;

        radial-gradient(ellipse 70% 50% at 80% 80%, #9b2d6055 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 60% 10%, #3b1a4844 0%, transparent 60%),
        linear-gradient(135deg, #1e0a1c 0%, #2d0f2a 50%, #1a0c1e 100%);
      animation: meshDrift 12s ease-in-out infinite alternate;
    }
    @keyframes meshDrift {
      0%   { filter: hue-rotate(0deg) brightness(1); }
      100% { filter: hue-rotate(15deg) brightness(1.08); }
    }

    /* ── Floating ambient orbs ── */
    .orb { position: fixed; border-radius: 50%; filter: blur(70px); z-index: 0; animation: orbFloat linear infinite; }
    .orb1 { width: 300px; height: 300px; background: rgba(201,97,122,0.18); top: -80px; left: -80px; animation-duration: 18s; }
    .orb2 { width: 250px; height: 250px; background: rgba(212,168,67,0.12); bottom: -60px; right: -60px; animation-duration: 22s; animation-delay: -5s; }
    .orb3 { width: 180px; height: 180px; background: rgba(107,31,94,0.25); top: 50%; left: 60%; animation-duration: 15s; animation-delay: -9s; }

      0%   { transform: translate(0,0) scale(1); }
      33%  { transform: translate(30px,-40px) scale(1.1); }
      66%  { transform: translate(-20px,20px) scale(0.92); }
      100% { transform: translate(0,0) scale(1); }
    }

    canvas#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 10; }

    /* ── Card ── */
    .card-wrap { position: relative; z-index: 5; padding: 20px; width: 100%; max-width: 480px; }

    .card {
      background: var(--glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 44px 36px 36px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.04) inset;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    }

    /* shimmer sweep */
    .card::after {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.04) 50%, transparent 60%);
      animation: shimmer 7s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes shimmer { 0%, 100% { left: -100%; } 50% { left: 140%; } }

    /* ── Crown badge ── */
    .crown-badge {
      position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(135deg, #c9617a, #d4a843);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase;
      padding: 6px 22px; border-radius: 20px;
      box-shadow: 0 4px 20px rgba(212,168,67,0.35);
      white-space: nowrap;
    }

    /* ── Heading ── */
    .card-header { text-align: center; margin-bottom: 6px; }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 8vw, 2.8rem);
      font-weight: 600;
      line-height: 1.1;
      background: linear-gradient(135deg, #f7d794 0%, #f5c6cb 40%, #c9617a 70%, #d4a843 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.01em;
    }

    .subtitle {
      font-size: 12.5px; color: rgba(255,255,255,0.4);
      letter-spacing: 0.22em; text-transform: uppercase; margin-top: 4px;
    }

    /* ── Age ticker ── */
    .age-block {
      margin: 22px 0 18px;
      text-align: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px 20px;
      position: relative;
    }
    .age-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 4px; }
    .age-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.9rem;
      font-weight: 600;
      color: var(--champagne);
      letter-spacing: 0.02em;
    }
    .age-pulse {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      width: 8px; height: 8px; border-radius: 50%;
      background: #c9617a;
      box-shadow: 0 0 0 0 rgba(201,97,122,0.6);

      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 18px 20px;
      min-height: 80px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;

    .joke-text {

      font-style: italic;
      font-size: 1.07rem;
      line-height: 1.55;
      color: rgba(255,255,255,0.82);
      text-align: center;

    }
    .joke-text.fade { opacity: 0; }

    /* ── Buttons ── */
    .btn-group { display: flex; flex-direction: column; gap: 10px; }

    .btn {

      border: none; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500;
      border-radius: 14px;
      padding: 14px 20px;

    .btn-wish {

      color: rgba(255,255,255,0.88);

    .btn-gift .btn-ripple {

      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.18) 50%, transparent 60%);

      color: rgba(255,255,255,0.6);

      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);

  // ── Web Audio coin chime ──
  function playCoinChime() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const notes = [
        { freq: 1046.5, start: 0,    dur: 0.18 },
        { freq: 1318.5, start: 0.08, dur: 0.18 },
        { freq: 1567.9, start: 0.16, dur: 0.28 },
      ];
      notes.forEach(({ freq, start, dur }) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
        gain.gain.setValueAtTime(0, ctx.currentTime + start);
        gain.gain.linearRampToValueAtTime(0.28, ctx.currentTime + start + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(ctx.currentTime + start);
        osc.stop(ctx.currentTime + start + dur + 0.05);
      });
      setTimeout(() => ctx.close(), 1200);
    } catch(e) {}
  }

  canvas.width  = window.innerWidth;

  let particles = [];

  const COLORS  = ["#f7d794","#c9617a","#f5c6cb","#d4a843","#e8a0b0","#fff5cc","#b5a9f5","#a8e6cf"];

  function spawnParticle() {

      x, y: -10,
      vx: (Math.random() - 0.5) * 3,
      vy: Math.random() * 3 + 1.5,
      size: Math.random() * 9 + 4,

      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      rotation: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 0.15,

      decay: Math.random() * 0.008 + 0.004

  }

  function drawStar(cx, cy, r) {
    ctx2.beginPath();
    for (let i = 0; i < 5; i++) {
      const a1 = (i * 4 * Math.PI / 5) - Math.PI / 2;
      const a2 = (i * 4 * Math.PI / 5 + 2 * Math.PI / 5) - Math.PI / 2;
      if (i === 0) ctx2.moveTo(cx + r * Math.cos(a1), cy + r * Math.sin(a1));
      else ctx2.lineTo(cx + r * Math.cos(a1), cy + r * Math.sin(a1));
      ctx2.lineTo(cx + (r/2.2) * Math.cos(a2), cy + (r/2.2) * Math.sin(a2));
    }
    ctx2.closePath();
  }

  function drawHeart(cx, cy, s) {
    ctx2.beginPath();
    ctx2.moveTo(cx, cy + s * 0.3);
    ctx2.bezierCurveTo(cx, cy, cx - s, cy, cx - s, cy - s * 0.35);
    ctx2.bezierCurveTo(cx - s, cy - s * 0.9, cx, cy - s * 0.9, cx, cy - s * 0.5);
    ctx2.bezierCurveTo(cx, cy - s * 0.9, cx + s, cy - s * 0.9, cx + s, cy - s * 0.35);
    ctx2.bezierCurveTo(cx + s, cy, cx, cy, cx, cy + s * 0.3);
    ctx2.closePath();
  }

  function loop() {
    ctx2.clearRect(0, 0, canvas.width, canvas.height);
    particles = particles.filter(p => p.life > 0 && p.y < canvas.height + 20);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.rotation += p.spin;
      p.vy += 0.04;
      p.life -= p.decay;
      ctx2.save();
      ctx2.globalAlpha = Math.max(0, p.life);
      ctx2.translate(p.x, p.y);
      ctx2.rotate(p.rotation);
      ctx2.fillStyle = p.color;
      if (p.shape === "rect") {
        ctx2.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      } else if (p.shape === "circle") {
        ctx2.beginPath(); ctx2.arc(0, 0, p.size / 2, 0, Math.PI * 2); ctx2.fill();
      } else if (p.shape === "star") {
        drawStar(0, 0, p.size / 2); ctx2.fill();
      } else {
        drawHeart(0, 0, p.size / 2.4); ctx2.fill();
      }
      ctx2.restore();
    });
    requestAnimationFrame(loop);
  }
